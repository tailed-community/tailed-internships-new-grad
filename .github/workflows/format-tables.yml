name: Format Job Tables

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/jobs.json"
      - "scripts/format_tables.py"
      - "scripts/core/markdown.py"
      - "scripts/core/normalize.py"

concurrency:
  group: format-job-tables-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  format-tables:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate markdown tables
        run: python scripts/format_tables.py

      - name: Commit and push table formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md NEW_GRAD.md
          if git diff --cached --quiet; then
            echo "No table changes to commit"
            exit 0
          fi
          git commit -m "chore: format job tables"
          git pull --rebase
          git push
