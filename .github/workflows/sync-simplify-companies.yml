name: Sync Simplify Company Sources

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: sync-simplify-companies-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-simplify-companies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Simplify company sources
        run: |
          python scripts/sync_company_leads.py
          python scripts/promote_company_leads.py
          python scripts/sync_companies.py

      - name: Commit and push company source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/company_leads.csv data/company_sources.csv data/companies.json
          if git diff --cached --quiet; then
            echo "No Simplify company source changes to commit"
            exit 0
          fi
          git commit -m "chore: sync Simplify company sources"
          git pull --rebase
          git push
