name: Update Job Listings By Source

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-jobs-by-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run source updaters sequentially
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/sync_companies.py
          for source in workday lever greenhouse ashby; do
            echo "Running updater for source: $source"
            python scripts/main.py --source "$source"

            git add data/company_sources.csv data/companies.json data/jobs.json data/archived.json README.md NEW_GRAD.md
            if git diff --cached --quiet; then
              echo "No $source changes to commit"
              continue
            fi

            git commit -m "chore: update $source jobs"
            git pull --rebase
            git push
          done
